<!DOCTYPE html>
<html>
<head>
    <title>Respiratory Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">🫁 Respiratory Health Monitor</h1>
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4 mb-3 shadow-sm">
                    <h3>Vitals</h3>
                    <hr>
                    <p>Heart Rate: <span id="bpmVal" class="fw-bold text-danger">0</span> BPM</p>
                    <p>SpO2: <span id="spo2Val" class="fw-bold text-primary">0</span> %</p>
                    <div id="status" class="alert alert-info">Initializing...</div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <canvas id="audioChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('audioChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{ label: 'Audio Signal', data: Array(20).fill(0), borderColor: 'blue', tension: 0.4 }]
            },
            options: { scales: { y: { min: 0, max: 1000 } }, animation: false }
        });

        async function update() {
            try {
                const res = await fetch('/data');
                const data = await res.json();
                
                document.getElementById('bpmVal').innerText = data.bpm;
                document.getElementById('spo2Val').innerText = data.spo2;
                document.getElementById('status').innerText = data.status;

                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(data.audio);
                chart.update();
            } catch (e) { console.log("Update error"); }
        }
        setInterval(update, 500);
    </script>
</body>
</html>
